<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Admin - Nexus Redação</title>
    <link rel="icon" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/site.css" />
  </head>
  <body class="admin-body">
    <section id="loginView" class="admin-login">
      <div class="admin-login-card">
        <img src="/logo.png" alt="Nexus Redação" />
        <h1>Painel Admin</h1>
        <p>Entre com o usuário e senha configurados na Vercel.</p>
        <form id="adminLoginForm">
          <input id="adminUsername" name="username" type="text" placeholder="Usuário" autocomplete="username" required />
          <input id="adminPassword" name="password" type="password" placeholder="Senha" autocomplete="current-password" required />
          <button class="button primary" type="submit">Entrar</button>
        </form>
      </div>
    </section>

    <section id="adminView" class="admin-shell" hidden>
      <aside class="admin-sidebar">
        <a class="brand" href="/">
          <img src="/logo.png" alt="Nexus" />
          <span>Nexus</span>
        </a>
        <button class="admin-nav active" data-view="licenses">Licenças</button>
        <button class="admin-nav" data-view="create">Nova licença</button>
        <button class="admin-nav" data-view="customers">Clientes</button>
        <button class="admin-nav" id="logoutButton">Sair</button>
      </aside>

      <main class="admin-main">
        <header class="admin-top">
          <div>
            <p class="eyebrow">Administração</p>
            <h1>Licenças Nexus Redação</h1>
          </div>
          <div class="admin-top-actions">
            <button id="refreshButton" class="button secondary">Atualizar</button>
          </div>
        </header>

        <section class="admin-metrics">
          <article><span id="metricCustomers">0</span><strong>Clientes</strong></article>
          <article><span id="metricTotal">0</span><strong>Licenças</strong></article>
          <article><span id="metricActive">0</span><strong>Ativas</strong></article>
          <article><span id="metricMachines">0</span><strong>Máquinas</strong></article>
        </section>

        <section id="createPanel" class="admin-card" hidden>
          <h2>Nova licença</h2>
          <form id="licenseForm" class="admin-form">
            <label class="wide">Cliente cadastrado
              <select name="customerId" id="licenseCustomerSelect">
                <option value="">Selecionar cliente</option>
              </select>
            </label>
            <label>Cliente avulso<input name="customerName" placeholder="Nome da empresa ou cliente" /></label>
            <label>E-mail<input name="customerEmail" type="email" placeholder="cliente@email.com" /></label>
            <label>Plano<input name="plan" value="standard" /></label>
            <label>Validade<input name="expiresAt" type="datetime-local" /></label>
            <label>Máquinas<input name="maxActivations" type="number" min="1" value="1" /></label>
            <label class="wide">Observações<textarea name="notes" rows="3"></textarea></label>
            <button class="button primary" type="submit">Gerar licença</button>
          </form>
          <div id="createdLicense" class="created-license" hidden></div>
        </section>

        <section id="customersPanel" class="admin-card" hidden>
          <div class="card-heading">
            <h2>Clientes</h2>
            <span id="customersSummary">0 cliente(s)</span>
          </div>
          <form id="customerForm" class="admin-form">
            <input type="hidden" name="id" />
            <label>Nome<input name="name" required placeholder="Nome do cliente" /></label>
            <label>Empresa<input name="company" placeholder="Empresa ou emissora" /></label>
            <label>CPF/CNPJ<input name="document" placeholder="Documento" /></label>
            <label>E-mail<input name="email" type="email" placeholder="cliente@email.com" /></label>
            <label>Telefone<input name="phone" placeholder="(00) 00000-0000" /></label>
            <label>Cidade<input name="city" placeholder="Cidade" /></label>
            <label>Estado<input name="state" placeholder="UF" maxlength="2" /></label>
            <label>Status
              <select name="status">
                <option value="active">Ativo</option>
                <option value="inactive">Inativo</option>
              </select>
            </label>
            <label class="wide">Observações<textarea name="notes" rows="3"></textarea></label>
            <button class="button primary" type="submit">Salvar cliente</button>
            <button class="button secondary" type="button" id="clearCustomerForm">Limpar</button>
          </form>
          <div id="customerList" class="customer-list"></div>
        </section>

        <section id="licensesPanel" class="admin-card">
          <div class="card-heading">
            <h2>Licenças cadastradas</h2>
            <span id="summaryText">Carregando...</span>
          </div>
          <div id="licenseList" class="license-list"></div>
        </section>
      </main>
    </section>

    <div id="toast" class="toast" hidden></div>
    <script src="/assets/admin.js"></script>
  </body>
</html>
